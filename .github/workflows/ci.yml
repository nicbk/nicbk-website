# CI gate for every task PR — see research/devops-deployment/ci-pipeline.md.
#
# Security posture (public repo, self-hosted runner):
# - Trigger is plain `pull_request`, NEVER `pull_request_target`: fork PRs
#   run with a read-only token and no secrets access.
# - All third-party actions are pinned by full commit SHA, not by tag.
# - Zero GitHub-side repository secrets are used (GITHUB_TOKEN below is
#   GitHub's automatic per-run token, not a configured secret).
# - The repo setting "require approval for all outside collaborators" must
#   stay enabled so fork PR workflows don't start without manual approval.
name: CI

# `edited` is included so retitling a PR re-runs the PR-title lint —
# without it a corrected title would leave the failed check stuck red.
on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

jobs:
  checks:
    name: Biome, typecheck, unit tests
    # TODO(#11): temporarily GitHub-hosted (free/unlimited for public repos)
    # until the self-hosted Sysbox runner is deployed — then switch back to
    # `runs-on: self-hosted` per research/devops-deployment/ci-pipeline.md.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Read-only: lets the ratchet step download the coverage-baseline
      # artifact published by the main-branch coverage-baseline.yml run.
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Biome (format + lint, project-wide)
        run: npx biome ci .

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Download coverage baseline from main
        env:
          GH_TOKEN: ${{ github.token }}
        # Latest successful main-branch baseline run; a missing baseline is
        # tolerated (bootstrap / expired artifact) — the ratchet script
        # passes with a notice in that case.
        run: |
          run_id=$(gh api \
            "repos/$GITHUB_REPOSITORY/actions/workflows/coverage-baseline.yml/runs?branch=main&status=success&per_page=1" \
            -q '.workflow_runs[0].id // empty')
          if [ -n "$run_id" ]; then
            gh run download "$run_id" --name coverage-baseline --dir coverage-baseline \
              || echo "coverage-baseline artifact not found on run $run_id"
          else
            echo "no successful coverage-baseline run on main yet"
          fi

      - name: Coverage ratchet (must not drop below main)
        run: node scripts/coverage-ratchet.mjs coverage/coverage-summary.json coverage-baseline/coverage-summary.json

      - name: Upload coverage HTML report
        # always(): the report is most useful exactly when the ratchet fails.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  e2e:
    name: Playwright e2e + axe (production build)
    # TODO(#11): same temporary GitHub-hosted arrangement as `checks` above.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # playwright.config.ts sees CI=true and serves the built production
      # server (npm run build && npm run start) instead of the dev server,
      # so the production serving path is what e2e + axe exercise.
      - name: Playwright e2e (includes axe accessibility checks)
        run: npm run test:e2e

      - name: Upload Playwright traces/report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  pr-title:
    name: PR title (Conventional Commits)
    # TODO(#11): same temporary GitHub-hosted arrangement as `checks` above.
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      # Enforces the Conventional Commits PR-title format — the PR title
      # becomes the squash-merge commit on main. See
      # research/project-management-conventions/commit-message-conventions.md.
      - name: Lint PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
