# Publishes the unit-test coverage baseline from every push to main. PR
# runs (ci.yml) download the most recent baseline and fail if their own
# coverage drops below it — the ratchet gate decided in
# research/testing-qa/test-coverage-and-ci-gating.md.
#
# Same security posture as ci.yml: no repository secrets, actions pinned
# by full commit SHA.
name: Coverage baseline

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  baseline:
    name: Record coverage baseline
    # TODO(#11): temporarily GitHub-hosted until the self-hosted Sysbox
    # runner is deployed — then switch to `runs-on: self-hosted` per
    # research/devops-deployment/ci-pipeline.md.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage baseline
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-baseline
          path: coverage/coverage-summary.json
          retention-days: 90
