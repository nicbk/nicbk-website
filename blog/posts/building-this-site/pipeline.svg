<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" width="640" height="200">
  <title>Build-time MDX pipeline</title>
  <rect width="640" height="200" fill="#f5f5f5" />
  <g font-family="monospace" font-size="15" text-anchor="middle">
    <rect x="24" y="70" width="150" height="60" fill="#ffffff" stroke="#767676" />
    <text x="99" y="105">index.mdx</text>

    <rect x="245" y="70" width="150" height="60" fill="#ffffff" stroke="#767676" />
    <text x="320" y="97">build-time</text>
    <text x="320" y="116">compile</text>

    <rect x="466" y="70" width="150" height="60" fill="#ffffff" stroke="#767676" />
    <text x="541" y="105">static HTML</text>

    <line x1="174" y1="100" x2="245" y2="100" stroke="#767676" stroke-width="2" marker-end="url(#arrow)" />
    <line x1="395" y1="100" x2="466" y2="100" stroke="#767676" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#767676" />
    </marker>
  </defs>
</svg>
